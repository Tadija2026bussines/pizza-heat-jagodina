<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .search-box button {
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .main-weather {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .location-info h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 5px;
        }

        .location-info p {
            color: #666;
            font-size: 0.95rem;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .weather-icon {
            font-size: 5rem;
            color: #667eea;
        }

        .weather-temp {
            font-size: 4rem;
            color: #333;
            font-weight: 700;
        }

        .weather-description {
            font-size: 1.3rem;
            color: #666;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .detail-item label {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .detail-item .value {
            font-size: 1.3rem;
            color: #333;
            font-weight: 600;
        }

        .hourly-forecast {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .hourly-forecast h3 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .hourly-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .hourly-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            min-width: 100px;
            transition: 0.3s;
        }

        .hourly-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .hourly-item .time {
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .hourly-item .icon {
            font-size: 1.5rem;
            margin: 8px 0;
        }

        .hourly-item .temp {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .forecast {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .forecast h3 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .forecast-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .forecast-item .day {
            font-size: 0.95rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .forecast-item .icon {
            font-size: 2rem;
            margin: 10px 0;
        }

        .forecast-item .temp-range {
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .forecast-item .condition {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .search-box input {
                width: 100%;
            }

            .main-weather {
                padding: 20px;
            }

            .weather-header {
                flex-direction: column;
                text-align: center;
            }

            .weather-main {
                flex-direction: column;
            }

            .weather-icon {
                font-size: 3rem;
            }

            .weather-temp {
                font-size: 2.5rem;
            }

            .hourly-container {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                value="Jagodina"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div id="weatherContent"></div>
    </div>

    <script>
        const API_KEY = '01d4b3e330d72afb1634f7865b3639c4'; // Free OpenWeatherMap API key
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';

        // Get weather icon
        function getWeatherIcon(iconCode) {
            const iconMap = {
                '01d': '<i class="fas fa-sun"></i>',
                '01n': '<i class="fas fa-moon"></i>',
                '02d': '<i class="fas fa-cloud-sun"></i>',
                '02n': '<i class="fas fa-cloud-moon"></i>',
                '03d': '<i class="fas fa-cloud"></i>',
                '03n': '<i class="fas fa-cloud"></i>',
                '04d': '<i class="fas fa-cloud"></i>',
                '04n': '<i class="fas fa-cloud"></i>',
                '09d': '<i class="fas fa-cloud-rain"></i>',
                '09n': '<i class="fas fa-cloud-rain"></i>',
                '10d': '<i class="fas fa-cloud-rain"></i>',
                '10n': '<i class="fas fa-cloud-rain"></i>',
                '11d': '<i class="fas fa-bolt"></i>',
                '11n': '<i class="fas fa-bolt"></i>',
                '13d': '<i class="fas fa-snowflake"></i>',
                '13n': '<i class="fas fa-snowflake"></i>',
                '50d': '<i class="fas fa-smog"></i>',
                '50n': '<i class="fas fa-smog"></i>'
            };
            return iconMap[iconCode] || '<i class="fas fa-cloud-sun"></i>';
        }

        // Format date
        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        // Format time
        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString('en-US', { 
                hour: 'numeric',
                minute: '2-digit',
                hour12: true 
            });
        }

        // Search weather
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                alert('Please enter a city name');
                return;
            }
            
            await getWeatherData(city);
        }

        // Get weather data
        async function getWeatherData(city) {
            const weatherContent = document.getElementById('weatherContent');
            weatherContent.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading weather data...</div>';

            try {
                // Get current weather and coordinates
                const currentResponse = await fetch(
                    `${BASE_URL}/weather?q=${city}&appid=${API_KEY}&units=metric`
                );

                if (!currentResponse.ok) {
                    throw new Error('City not found');
                }

                const currentData = await currentResponse.json();
                const { lat, lon } = currentData.coord;

                // Get forecast data
                const forecastResponse = await fetch(
                    `${BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );

                const forecastData = await forecastResponse.json();

                // Render the weather dashboard
                renderWeather(currentData, forecastData);
            } catch (error) {
                weatherContent.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> ${error.message}</div>`;
            }
        }

        // Render weather dashboard
        function renderWeather(current, forecast) {
            const weatherContent = document.getElementById('weatherContent');
            const temp = Math.round(current.main.temp);
            const feelsLike = Math.round(current.main.feels_like);
            const humidity = current.main.humidity;
            const windSpeed = Math.round(current.wind.speed);
            const description = current.weather[0].main;
            const icon = current.weather[0].icon;
            const city = current.name;
            const country = current.sys.country;

            // Group hourly forecast (every 3 hours)
            const hourlyForecasts = forecast.list.slice(0, 8);

            // Get daily forecast (one per day)
            const dailyForecasts = [];
            let lastDate = null;
            for (let item of forecast.list) {
                const date = new Date(item.dt * 1000).toDateString();
                if (date !== lastDate && dailyForecasts.length < 5) {
                    dailyForecasts.push(item);
                    lastDate = date;
                }
            }

            const hourlyHTML = hourlyForecasts.map(hour => `
                <div class="hourly-item">
                    <div class="time">${formatTime(hour.dt)}</div>
                    <div class="icon">${getWeatherIcon(hour.weather[0].icon)}</div>
                    <div class="temp">${Math.round(hour.main.temp)}°C</div>
                </div>
            `).join('');

            const forecastHTML = dailyForecasts.map(day => `
                <div class="forecast-item">
                    <div class="day">${formatDate(day.dt)}</div>
                    <div class="icon">${getWeatherIcon(day.weather[0].icon)}</div>
                    <div class="temp-range">
                        <strong>${Math.round(day.main.temp_max)}°</strong> / ${Math.round(day.main.temp_min)}°
                    </div>
                    <div class="condition">${day.weather[0].main}</div>
                </div>
            `).join('');

            weatherContent.innerHTML = `
                <div class="main-weather">
                    <div class="weather-header">
                        <div class="location-info">
                            <h2>${city}, ${country}</h2>
                            <p>${formatDate(current.dt)}</p>
                        </div>
                    </div>

                    <div class="weather-main">
                        <div class="weather-icon">${getWeatherIcon(icon)}</div>
                        <div>
                            <div class="weather-temp">${temp}°C</div>
                            <div class="weather-description">${description}</div>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <label>Feels Like</label>
                            <div class="value">${feelsLike}°C</div>
                        </div>
                        <div class="detail-item">
                            <label>Humidity</label>
                            <div class="value">${humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <label>Wind Speed</label>
                            <div class="value">${windSpeed} m/s</div>
                        </div>
                        <div class="detail-item">
                            <label>Pressure</label>
                            <div class="value">${current.main.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <label>Visibility</label>
                            <div class="value">${(current.visibility / 1000).toFixed(1)} km</div>
                        </div>
                        <div class="detail-item">
                            <label>UV Index</label>
                            <div class="value">N/A</div>
                        </div>
                    </div>
                </div>

                <div class="hourly-forecast">
                    <h3><i class="fas fa-clock"></i> Hourly Forecast</h3>
                    <div class="hourly-container">
                        ${hourlyHTML}
                    </div>
                </div>

                <div class="forecast">
                    <h3><i class="fas fa-calendar"></i> 5-Day Forecast</h3>
                    <div class="forecast-grid">
                        ${forecastHTML}
                    </div>
                </div>
            `;
        }

        // Load weather on page load
        window.addEventListener('load', () => {
            getWeatherData('Jagodina');
        });

        // Allow Enter key to search
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });
    </script>
</body>
</html>
